<!DOCTYPE html>

<html lang="en">
<head>

<title>Meme Box</title>

<style>
:root {
  --safe-top: env(safe-area-inset-top, 44px);
  --header-h: 0px;
  --strip-h: 0px;
  --count-h: 0px;
}

html, body {
margin: 0; padding: 0;
width: 100%; height: 100%;
background: #fdf0f5;
font-family: ‘DM Sans’, Arial, sans-serif;
-webkit-font-smoothing: antialiased;
/* NO overflow:hidden / position:fixed on body — causes scroll issues in Safari */
}

- { -webkit-box-sizing: border-box; box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

#dotbg {
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background-image: radial-gradient(circle at center, rgba(224,127,168,0.38) 1.5px, transparent 1.5px);
background-size: 22px 22px;
pointer-events: none;
z-index: 0;
}
#b1 {
position: fixed; top: -60px; right: -60px;
width: 200px; height: 200px;
background: radial-gradient(circle, rgba(201,184,232,0.28) 0%, transparent 70%);
border-radius: 50%;
pointer-events: none; z-index: 0;
}
#b2 {
position: fixed; bottom: 8%; left: -80px;
width: 240px; height: 240px;
background: radial-gradient(circle, rgba(184,228,216,0.22) 0%, transparent 70%);
border-radius: 50%;
pointer-events: none; z-index: 0;
}

/* ── HEADER ── */
#header {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 20;
background: rgba(253,240,245,0.97);
-webkit-backdrop-filter: blur(8px);
backdrop-filter: blur(8px);
border-bottom: 1.5px solid #f0d6e4;
padding-left: 16px;
padding-right: 16px;
padding-bottom: 11px;
padding-top: calc(var(–safe-top) + 8px);
}
#header-inner {
display: -webkit-flex; display: flex;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: space-between; justify-content: space-between;
}
#logo-wrap {
display: -webkit-flex; display: flex;
-webkit-align-items: center; align-items: center;
gap: 8px;
}
#logo-flower {
font-size: 22px;
display: inline-block;
-webkit-animation: spin 10s linear infinite;
animation: spin 10s linear infinite;
}
@-webkit-keyframes spin { 0%{-webkit-transform:rotate(0deg)} 100%{-webkit-transform:rotate(360deg)} }
@keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
#logo-text {
font-family: ‘Playfair Display’, Georgia, serif;
font-weight: 700; font-size: 22px; color: #e07fa8; letter-spacing: -0.3px;
}
#btns { display: -webkit-flex; display: flex; gap: 8px; }
.hbtn {
width: 42px; height: 42px; border-radius: 21px; border: none;
background: -webkit-linear-gradient(135deg,#f4a7c3,#e07fa8);
background: linear-gradient(135deg,#f4a7c3,#e07fa8);
box-shadow: 0 4px 14px rgba(224,127,168,0.45);
color: white; cursor: pointer;
display: -webkit-flex; display: flex;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: center; justify-content: center;
-webkit-appearance: none;
-webkit-transition: opacity 0.12s; transition: opacity 0.12s;
flex-shrink: 0;
}
.hbtn:active { opacity: 0.7; }
.hbtn.lilac {
background: -webkit-linear-gradient(135deg,#c9b8e8,#a080d0);
background: linear-gradient(135deg,#c9b8e8,#a080d0);
box-shadow: 0 4px 14px rgba(160,128,208,0.45);
}

/* ── FOLDER STRIP ── */
#folder-strip {
position: fixed;
left: 0; right: 0;
z-index: 19;
background: rgba(255,245,249,0.97);
-webkit-backdrop-filter: blur(6px);
backdrop-filter: blur(6px);
border-bottom: 1px solid #f0d6e4;
padding: 9px 16px;
overflow-x: auto; overflow-y: hidden;
white-space: nowrap;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
#folder-strip::-webkit-scrollbar { display: none; }

.fc {
display: -webkit-inline-flex; display: inline-flex;
-webkit-align-items: center; align-items: center;
gap: 4px;
background: #ffffff; border: 1.5px solid #f0d6e4; border-radius: 30px;
padding: 6px 12px 6px 10px;
font-family: ‘DM Sans’, Arial, sans-serif; font-size: 12px; font-weight: 500; color: #a8849a;
white-space: nowrap; cursor: pointer; margin-right: 7px; vertical-align: middle;
}
.fc.on {
background: -webkit-linear-gradient(135deg,#f4a7c3,#c9b8e8);

border-color: transparent; color: white;

}
.fc .cc {
display: inline-block; border-radius: 10px; padding: 1px 6px; font-size: 10px;

.fc:not(.on) .cc { background: #fdf0f5; color: #a8849a; }
.nfb {
display: -webkit-inline-flex; display: inline-flex;
-webkit-align-items: center; align-items: center;
background: transparent; border: 1.5px dashed #e8c4d8; border-radius: 30px;
padding: 6px 13px; color: #c8a0b8;
font-family: ‘DM Sans’, Arial, sans-serif; font-size: 12px; font-weight: 500;

}

/* ── COUNT ROW ── */
#count-row {
position: fixed;
left: 0; right: 0;
z-index: 18;
padding: 3px 18px 2px;
font-style: italic; font-family: ‘Playfair Display’, Georgia, serif;

/* ── SCROLL BOX ── fixed, overscroll within ── */

left: 0; right: 0; bottom: 0;

#grid { font-size: 0; line-height: 0; }

.mc {
display: inline-block;
width: calc(33.333% - 8px);
margin: 4px;

}
.mc:after { content: ‘’; display: block; padding-top: 100%; }
.mc img {
position: absolute; top: 0; left: 0;

}
.mc.sel { border-color: #e07fa8; box-shadow: 0 0 0 3px rgba(224,127,168,0.3); }
.mc .ck {
position: absolute; top: 5px; right: 5px;

}
.mc.sel .ck { display: block; }

#empty-wrap { padding: 60px 20px; text-align: center; }
#empty-ico {
font-size: 52px; display: block; margin-bottom: 14px;
-webkit-animation: bob 3s ease-in-out infinite;

@-webkit-keyframes bob { 0%,100%{-webkit-transform:translateY(0)} 50%{-webkit-transform:translateY(-8px)} }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

#selbar {
position: fixed;
left: 50%; bottom: 28px;

transform: translateX(-50%) translateY(130px);

padding: 8px 10px;
display: -webkit-flex; display: flex;

-webkit-transform: translateX(-50%) translateY(0);
transform: translateX(-50%) translateY(0);
}
.sab {
border-radius: 22px; padding: 8px 14px;
font-family:‘DM Sans’,Arial,sans-serif; font-size:13px; font-weight:500;
border: 1.5px solid #f0d6e4; background: #fdf0f5; color: #4a3040;

position: fixed; top:0; left:0; right:0; bottom:0;
background: rgba(253,240,245,0.97);
z-index: 200; display: none;
-webkit-flex-direction: column; flex-direction: column;
-webkit-align-items: center; align-items: center;
}
#lb.open { display: -webkit-flex; display: flex; }
#lbhd {
width:100%; flex-shrink:0;
display: -webkit-flex; display: flex;
-webkit-align-items:center; align-items:center;
-webkit-justify-content:space-between; justify-content:space-between;
padding: 54px 16px 10px;
}
#lbclose {
width:38px; height:38px; border-radius:19px;
background:#fff; border:1.5px solid #f0d6e4; color:#a8849a; font-size:17px;
cursor:pointer;
display:-webkit-flex;display:flex;
-webkit-align-items:center;align-items:center;
-webkit-justify-content:center;justify-content:center;
-webkit-appearance:none;

#lbtag{font-family:‘Playfair Display’,Georgia,serif;font-style:italic;font-size:13px;color:#a8849a}
#lbimg-wrap {
flex:1;width:100%;
display:-webkit-flex;display:flex;

-webkit-justify-content:center;justify-content:center;

max-width:100%;max-height:100%;object-fit:contain;

#lbbtns{
display:-webkit-flex;display:flex;
gap:10px;padding:10px 18px 34px;width:100%;
-webkit-justify-content:center;justify-content:center;
flex-shrink:0;
}
.lbb {
flex:1;max-width:150px;
background:#fff;border:1.5px solid #f0d6e4;border-radius:16px;
padding:13px 10px;color:#4a3040;
font-family:‘DM Sans’,Arial,sans-serif;font-size:13px;font-weight:500;
cursor:pointer;text-align:center;
display:-webkit-flex;display:flex;
-webkit-align-items:center;align-items:center;
-webkit-justify-content:center;justify-content:center;
gap:5px;-webkit-appearance:none;
}
.lbb:active{opacity:0.7}
.lbb.pk{background:-webkit-linear-gradient(135deg,#f4a7c3,#e07fa8);background:linear-gradient(135deg,#f4a7c3,#e07fa8);color:white;border:none;box-shadow:0 4px 16px rgba(224,127,168,0.4)}
.lbb.rd{color:#d46080;border-color:#f0c0d0;background:#fff5f7}

/* ── MODAL ── */
#mbg {
position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(74,48,64,0.35);z-index:300;
opacity:0;pointer-events:none;

#mbox {
background:#fff;border-radius:24px 24px 0 0;width:100%;

.mb{
width:100%;padding:14px;border-radius:14px;border:none;
cursor:pointer;font-family:‘DM Sans’,Arial,sans-serif;font-weight:500;font-size:15px;

.mb:active{opacity:0.8}
.mb.pk{background:-webkit-linear-gradient(135deg,#f4a7c3,#e07fa8);background:linear-gradient(135deg,#f4a7c3,#e07fa8);color:white;box-shadow:0 4px 14px rgba(224,127,168,0.32)}
.mb.gy{background:#fdf0f5;color:#a8849a;border:1.5px solid #f0d6e4}
.mb.rd{background:#fff0f3;color:#d46080;border:1.5px solid #f0c0d0}
.fo{
display:-webkit-flex;display:flex;
-webkit-align-items:center;align-items:center;
gap:10px;background:#fdf0f5;border:1.5px solid #f0d6e4;border-radius:13px;
padding:12px 14px;cursor:pointer;font-size:14px;font-family:‘DM Sans’,Arial,sans-serif;

}

/* ── TOAST ── */
#toast{
position:fixed;top:72px;left:50%;

<body>

<div id="dotbg"></div>
<div id="b1"></div>
<div id="b2"></div>

<!-- HEADER -->

<div id="header">
  <div id="header-inner">
    <div id="logo-wrap">
      <span id="logo-flower">🌸</span>
      <span id="logo-text">Meme Box</span>
    </div>
    <div id="btns">
      <!-- Select toggle -->
      <button class="hbtn" id="selbtn" onclick="toggleSel()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </button>
      <!-- Upload button — real button, triggers input via JS -->
      <button class="hbtn" id="upbtn" onclick="triggerUpload()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>
    </div>
  </div>
</div>

<!-- File input lives directly in body, not in a label -->

<input type="file" id="upload-input" accept="image/*" multiple>

<!-- FOLDER STRIP -->

<div id="folder-strip"></div>

<!-- COUNT -->

<div id="count-row"></div>

<!-- SCROLL AREA -->

<div id="scroll-box">
  <div id="grid"></div>
</div>

<!-- SEL BAR -->

<div id="selbar">
  <button class="sab" onclick="doMove()">📂 Move</button>
  <button class="sab danger" onclick="doDelete()">🗑 Delete</button>
  <button class="sab soft" onclick="exitSel()">✕ Done</button>
</div>

<!-- LIGHTBOX -->

<div id="lb">
  <div id="lbhd">
    <button id="lbclose" onclick="closeLB()">✕</button>
    <div id="lbtag"></div>
    <div style="width:38px"></div>
  </div>
  <div id="lbimg-wrap"><img id="lbimg" src="" alt=""></div>
  <div id="lbhint">✦ hold image to save or copy</div>
  <div id="lbbtns">
    <button class="lbb pk" onclick="doShare()">↑ Share</button>
    <button class="lbb" onclick="doLBMove()">📂 Move</button>
    <button class="lbb rd" onclick="doLBDel()">🗑 Delete</button>
  </div>
</div>

<!-- MODAL -->

<div id="mbg" onclick="bgTap(event)">
  <div id="mbox">
    <div id="mpill"></div>
    <div id="mtitle"></div>
    <div id="mbody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── GLOBALS ─────────────────────────────────────────────────────────
var _db = null;
var _folders = [];
var _memes = [];
var _curF = 'all';
var _inSel = false;
var _picked = {};
var _lbId = null;
var _toastT = null;

// ─── LAYOUT ──────────────────────────────────────────────────────────
// Uses CSS to position panels relative to each other via measured pixel values.
// Called after every render that might change header/strip height.
function measureLayout() {
  var header = document.getElementById('header');
  var strip  = document.getElementById('folder-strip');
  var count  = document.getElementById('count-row');
  var scroll = document.getElementById('scroll-box');

  if (!header || !strip || !count || !scroll) return;

  var hh = header.offsetHeight;
  var sh = strip.offsetHeight;
  var ch = count.offsetHeight;

  strip.style.top  = hh + 'px';
  count.style.top  = (hh + sh) + 'px';
  scroll.style.top = (hh + sh + ch) + 'px';
}

// ─── DB ──────────────────────────────────────────────────────────────
function openDB() {
  return new Promise(function(ok, no) {
    var r = indexedDB.open('mbx5', 1);
    r.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains('memes')) {
        var s = d.createObjectStore('memes', { keyPath: 'id', autoIncrement: true });
        s.createIndex('folder', 'folder', { unique: false });
      }
      if (!d.objectStoreNames.contains('folders')) {
        d.createObjectStore('folders', { keyPath: 'name' });
      }
    };
    r.onsuccess  = function(e) { _db = e.target.result; ok(); };
    r.onerror    = function()  { no(r.error); };
    r.onblocked  = function()  { no(new Error('blocked')); };
  });
}

function dbGet(store, key) {
  return new Promise(function(ok, no) {
    var r = _db.transaction(store).objectStore(store).get(key);
    r.onsuccess = function() { ok(r.result); };
    r.onerror   = function() { no(r.error); };
  });
}
function dbAll(store, idx, val) {
  return new Promise(function(ok, no) {
    var os = _db.transaction(store).objectStore(store);
    var r  = (idx && val !== undefined) ? os.index(idx).getAll(val) : os.getAll();
    r.onsuccess = function() { ok(r.result || []); };
    r.onerror   = function() { no(r.error); };
  });
}
function dbPut(store, obj) {
  return new Promise(function(ok, no) {
    var r = _db.transaction(store, 'readwrite').objectStore(store).put(obj);
    r.onsuccess = function() { ok(r.result); };
    r.onerror   = function() { no(r.error); };
  });
}
function dbDel(store, key) {
  return new Promise(function(ok, no) {
    var r = _db.transaction(store, 'readwrite').objectStore(store).delete(key);
    r.onsuccess = function() { ok(); };
    r.onerror   = function() { no(r.error); };
  });
}
function dbCount(store, idx, val) {
  return new Promise(function(ok, no) {
    var os = _db.transaction(store).objectStore(store);
    var r  = (idx && val !== undefined) ? os.index(idx).count(val) : os.count();
    r.onsuccess = function() { ok(r.result); };
    r.onerror   = function() { no(r.error); };
  });
}

// ─── BOOT ────────────────────────────────────────────────────────────
function boot() {
  // Initial layout pass (before DB loads)
  measureLayout();
  paintStrip();
  paintEmpty();

  openDB().then(function() {
    return dbAll('folders');
  }).then(function(rows) {
    _folders = rows || [];
    paintStrip();
    return loadGrid();
  }).catch(function(err) {
    console.warn('boot err', err);
    paintStrip();
    paintEmpty();
  });
}

// ─── UPLOAD — fixed for Safari iOS ───────────────────────────────────
// Trigger via button click so the gesture chain is intact for iOS file picker
function triggerUpload() {
  var inp = document.getElementById('upload-input');
  inp.value = ''; // reset so same file can be re-selected
  inp.click();
}

document.getElementById('upload-input').addEventListener('change', function(e) {
  var files = e.target.files;
  if (!files || !files.length) return;

  // Snapshot files array immediately (it becomes empty after async gap in some browsers)
  var list = [];
  for (var i = 0; i < files.length; i++) list.push(files[i]);

  showToast('⏳ Saving ' + list.length + (list.length !== 1 ? ' images…' : ' image…'));

  var saved = 0;
  var idx = 0;

  function next() {
    if (idx >= list.length) {
      e.target.value = '';
      showToast('🌸 Added ' + saved + (saved !== 1 ? ' memes' : ' meme'));
      loadGrid();
      return;
    }

    var file = list[idx];
    idx++;

    // Canvas-based resize/compress: avoids large base64 blobs that can
    // silently fail to persist in IndexedDB on iOS when images are >2-3 MB
    compressImage(file, 1200, 0.82).then(function(dataUrl) {
      var folder = (_curF === 'all') ? '' : _curF;
      return dbPut('memes', { dataUrl: dataUrl, folder: folder, added: Date.now() });
    }).then(function() {
      saved++;
      next();
    }).catch(function(err) {
      console.warn('save err', err);
      next(); // skip bad file, keep going
    });
  }

  next();
});

// Compress image via canvas — solves iOS large-file IndexedDB failures
function compressImage(file, maxPx, quality) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onerror = reject;
    reader.onload = function(ev) {
      var img = new Image();
      img.onerror = reject;
      img.onload = function() {
        var w = img.naturalWidth;
        var h = img.naturalHeight;

        // Downscale if needed
        if (w > maxPx || h > maxPx) {
          if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else        { w = Math.round(w * maxPx / h); h = maxPx; }
        }

        var canvas = document.createElement('canvas');
        canvas.width  = w;
        canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        // Use jpeg for photos (smaller), png for anything with alpha
        var mime = (file.type === 'image/png') ? 'image/png' : 'image/jpeg';
        var q    = (mime === 'image/jpeg') ? quality : undefined;

        try {
          var dataUrl = canvas.toDataURL(mime, q);
          resolve(dataUrl);
        } catch(e) {
          reject(e);
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── FOLDER STRIP ────────────────────────────────────────────────────
function paintStrip() {
  var strip = document.getElementById('folder-strip');
  strip.innerHTML = '';

  var a = document.createElement('span');
  a.className = 'fc' + (_curF === 'all' ? ' on' : '');
  a.innerHTML = '🌸 All <span class="cc" id="cc-all">0</span>';
  a.onclick = function() { switchF('all'); };
  strip.appendChild(a);

  for (var i = 0; i < _folders.length; i++) {
    (function(f) {
      var c = document.createElement('span');
      c.className = 'fc' + (_curF === f.name ? ' on' : '');
      c.innerHTML = '📂 ' + f.name + ' <span class="cc" id="cc-' + f.name + '">0</span>';
      c.onclick = function() { switchF(f.name); };
      var pt;
      c.addEventListener('touchstart', function() {
        pt = setTimeout(function() { showFolderOpts(f.name); }, 600);
      }, { passive: true });
      c.addEventListener('touchend',  function() { clearTimeout(pt); });
      c.addEventListener('touchmove', function() { clearTimeout(pt); });
      strip.appendChild(c);
    })(_folders[i]);
  }

  var nb = document.createElement('button');
  nb.className  = 'nfb';
  nb.textContent = '✦ New Folder';
  nb.onclick    = showNewFolderModal;
  strip.appendChild(nb);

  // Re-measure after strip paints (content height may change)
  requestAnimationFrame(function() {
    measureLayout();
    refreshCounts();
  });
}

function refreshCounts() {
  if (!_db) return;
  dbCount('memes').then(function(n) {
    var el = document.getElementById('cc-all');
    if (el) el.textContent = n;
  }).catch(function(){});
  for (var i = 0; i < _folders.length; i++) {
    (function(name) {
      dbCount('memes', 'folder', name).then(function(n) {
        var el = document.getElementById('cc-' + name);
        if (el) el.textContent = n;
      }).catch(function(){});
    })(_folders[i].name);
  }
}

function switchF(f) {
  _curF = f; _inSel = false; _picked = {};
  document.getElementById('selbar').className  = '';
  document.getElementById('selbtn').className  = 'hbtn';
  paintStrip();
  loadGrid();
}

// ─── GRID ─────────────────────────────────────────────────────────────
function loadGrid() {
  var p = _curF === 'all' ? dbAll('memes') : dbAll('memes', 'folder', _curF);
  return p.then(function(rows) {
    _memes = rows || [];
    _memes.sort(function(a, b) { return b.id - a.id; });
    paintGrid();
  }).catch(function() { paintEmpty(); });
}

function paintGrid() {
  var grid = document.getElementById('grid');
  var cr   = document.getElementById('count-row');

  if (!_memes.length) {
    cr.textContent = '';
    paintEmpty();
    return;
  }

  cr.textContent = _memes.length + ' meme' + (_memes.length !== 1 ? 's' : '') + ' ✦';
  grid.innerHTML = '';

  for (var i = 0; i < _memes.length; i++) {
    (function(m) {
      var card = document.createElement('div');
      card.className = 'mc' + (_picked[m.id] ? ' sel' : '');

      var img = document.createElement('img');
      img.src     = m.dataUrl;
      img.loading = 'lazy';
      img.decoding = 'async';
      card.appendChild(img);

      var ck = document.createElement('div');
      ck.className  = 'ck';
      ck.textContent = '✓';
      card.appendChild(ck);

      var pt;
      card.addEventListener('touchstart', function() {
        pt = setTimeout(function() {
          if (!_inSel) enterSel();
          pickToggle(m.id, card);
        }, 500);
      }, { passive: true });
      card.addEventListener('touchend',  function() { clearTimeout(pt); });
      card.addEventListener('touchmove', function() { clearTimeout(pt); });
      card.onclick = function() {
        if (_inSel) { pickToggle(m.id, card); }
        else        { openLB(m.id); }
      };

      grid.appendChild(card);
    })(_memes[i]);
  }
  refreshCounts();
}

function paintEmpty() {
  document.getElementById('grid').innerHTML =
    '<div id="empty-wrap">' +
    '<span id="empty-ico">🌷</span>' +
    '<div id="empty-ttl">nothing here yet~</div>' +
    '<div id="empty-sub">tap <strong style="color:#e07fa8">+</strong> to add memes from your photos</div>' +
    '</div>';
  refreshCounts();
}

function getMeme(id) {
  for (var i = 0; i < _memes.length; i++) if (_memes[i].id === id) return _memes[i];
  return null;
}

// ─── SELECT ──────────────────────────────────────────────────────────
function toggleSel() { if (_inSel) exitSel(); else enterSel(); }
function enterSel() {
  _inSel = true; _picked = {};
  document.getElementById('selbar').className = 'up';
  document.getElementById('selbtn').className = 'hbtn lilac';
}
function exitSel() {
  _inSel = false; _picked = {};
  var cs = document.querySelectorAll('.mc.sel');
  for (var i = 0; i < cs.length; i++) cs[i].classList.remove('sel');
  document.getElementById('selbar').className = '';
  document.getElementById('selbtn').className = 'hbtn';
}
function pickToggle(id, card) {
  if (_picked[id]) { delete _picked[id]; card.classList.remove('sel'); }
  else             { _picked[id] = true;  card.classList.add('sel'); }
}
function pickedList() {
  return Object.keys(_picked).map(function(k) { return parseInt(k, 10); });
}

function doDelete() {
  var ids = pickedList();
  if (!ids.length) { showToast('Select some memes first'); return; }
  var i = 0;
  function nx() {
    if (i >= ids.length) { showToast('🗑 Deleted ' + ids.length); exitSel(); loadGrid(); return; }
    dbDel('memes', ids[i]).then(function() { i++; nx(); }).catch(function() { i++; nx(); });
  }
  nx();
}
function doMove() {
  var ids = pickedList();
  if (!ids.length) { showToast('Select some memes first'); return; }
  showMoveModal(ids, false);
}

// ─── LIGHTBOX ─────────────────────────────────────────────────────────
function openLB(id) {
  var m = getMeme(id); if (!m) return;
  _lbId = id;
  document.getElementById('lbimg').src     = m.dataUrl;
  document.getElementById('lbtag').textContent = m.folder ? '📂 ' + m.folder : '';
  document.getElementById('lb').className  = 'open';
}
function closeLB() { document.getElementById('lb').className = ''; _lbId = null; }

function doShare() {
  var m = getMeme(_lbId); if (!m) return;
  if (navigator.share) {
    try {
      var blob = urlToBlob(m.dataUrl);
      var ext  = blob.type === 'image/png' ? '.png' : blob.type === 'image/gif' ? '.gif' : '.jpg';
      var file = new File([blob], 'meme' + ext, { type: blob.type });
      var sd   = { files: [file] };
      if (!navigator.canShare || navigator.canShare(sd)) {
        navigator.share(sd).catch(function(e) {
          if (e.name !== 'AbortError') openImgWin(m.dataUrl);
        });
        return;
      }
    } catch(e) {}
  }
  openImgWin(m.dataUrl);
}
function doLBMove() { if (_lbId) showMoveModal([_lbId], true); }
function doLBDel() {
  if (!_lbId) return;
  var id = _lbId;
  dbDel('memes', id).then(function() {
    closeLB(); showToast('🗑 Deleted'); loadGrid();
  }).catch(function() { showToast('Error'); });
}

function openImgWin(url) {
  var h = '<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#fdf0f5;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;min-height:100vh}img{max-width:100%;max-height:100vh;border-radius:12px}p{position:fixed;bottom:24px;left:0;right:0;text-align:center;color:#c8a0b8;font-family:sans-serif;font-size:14px}</style></head><body><img src="' + url + '"><p>Hold image to Save to Photos</p></body></html>';

var w = window.open(’’, ‘_blank’);
if (w) { w.document.write(h); w.document.close(); showToast(‘Hold image to Save’); }
else showToast(‘Allow pop-ups and try again’);
}
function urlToBlob(url) {
var p = url.split(’,’); var mime = p[0].match(/:(.*?);/)[1];
var raw = atob(p[1]); var buf = new Uint8Array(raw.length);
for (var i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
return new Blob([buf], { type: mime });
}

// ─── MODALS ───────────────────────────────────────────────────────────
function showModal(title, html) {
document.getElementById(‘mtitle’).textContent = title;
document.getElementById(‘mbody’).innerHTML    = html;
document.getElementById(‘mbg’).className      = ‘open’;
}
function closeModal() { document.getElementById(‘mbg’).className = ‘’; }
function bgTap(e) { if (e.target === document.getElementById(‘mbg’)) closeModal(); }

function showNewFolderModal() {
showModal(‘New Folder ✦’,
‘<input id="fi" type="text" placeholder="Folder name…" maxlength="30">’ +
‘<button class="mb pk" onclick="createFolder()">Create</button>’ +
‘<button class="mb gy" onclick="closeModal()">Cancel</button>’);
setTimeout(function() { var el = document.getElementById(‘fi’); if (el) el.focus(); }, 100);
}
function createFolder() {
var el = document.getElementById(‘fi’); if (!el) return;
var name = el.value.trim();
if (!name) { showToast(‘Enter a name’); return; }
for (var i = 0; i < _folders.length; i++) if (_folders[i].name === name) { showToast(‘Already exists’); return; }
dbPut(‘folders’, { name: name }).then(function() {
_folders.push({ name: name });
closeModal(); paintStrip(); showToast(‘📂 Created “’ + name + ‘”’);
}).catch(function() { showToast(‘Error saving’); });
}

function showMoveModal(ids, fromLb) {
var inner = ‘<div class="fl"><div class="fo" onclick="execMove(' + JSON.stringify(ids) + ',\'\',' + fromLb + ')">🌸 All (no folder)</div>’;
for (var i = 0; i < _folders.length; i++) {
inner += ’<div class="fo" onclick="execMove(' + JSON.stringify(ids) + ',\'' + _folders[i].name + '\',' + fromLb + ')">📂 ’ + _folders[i].name + ‘</div>’;
}
inner += ‘</div><button class="mb gy" onclick="closeModal()">Cancel</button>’;
showModal(‘Move to… ✦’, inner);
}
function execMove(ids, target, fromLb) {
var i = 0;
function nx() {
if (i >= ids.length) {
closeModal();
if (fromLb) closeLB(); else exitSel();
showToast(’📂 Moved ’ + ids.length);
loadGrid(); return;
}
dbGet(‘memes’, ids[i]).then(function(m) {
if (m) { m.folder = target; return dbPut(‘memes’, m); }
}).then(function() { i++; nx(); }).catch(function() { i++; nx(); });
}
nx();
}

function showFolderOpts(name) {
showModal(’”’ + name + ‘”’,
‘<button class="mb gy" onclick="closeModal();showRenameModal(\'' + name + '\')">✏️ Rename</button>’ +
‘<button class="mb rd" onclick="deleteFolder(\'' + name + '\')">🗑 Delete Folder</button>’ +
‘<button class="mb gy" onclick="closeModal()">Cancel</button>’);
}
function deleteFolder(name) {
dbAll(‘memes’, ‘folder’, name).then(function(rows) {
rows = rows || [];
var i = 0;
function clr() {
if (i >= rows.length) return dbDel(‘folders’, name);
rows[i].folder = ‘’;
return dbPut(‘memes’, rows[i]).then(function() { i++; return clr(); });
}
return clr();
}).then(function() {
_folders = _folders.filter(function(f) { return f.name !== name; });
if (_curF === name) _curF = ‘all’;
closeModal(); paintStrip(); loadGrid(); showToast(‘🗑 Folder deleted’);
}).catch(function() { showToast(‘Error’); });
}
function showRenameModal(old) {
showModal(‘Rename ✦’,
‘<input id="ri" type="text" value="' + old + '" maxlength="30">’ +
‘<button class="mb pk" onclick="execRename(\'' + old + '\')">Save</button>’ +
‘<button class="mb gy" onclick="closeModal()">Cancel</button>’);
setTimeout(function() { var el = document.getElementById(‘ri’); if (el) { el.focus(); el.select(); } }, 100);
}
function execRename(old) {
var el = document.getElementById(‘ri’); if (!el) return;
var nw = el.value.trim();
if (!nw || nw === old) { closeModal(); return; }
for (var i = 0; i < _folders.length; i++) if (_folders[i].name === nw) { showToast(‘Name taken’); return; }
dbDel(‘folders’, old).then(function() {
return dbPut(‘folders’, { name: nw });
}).then(function() {
return dbAll(‘memes’, ‘folder’, old);
}).then(function(rows) {
rows = rows || []; var i = 0;
function upd() {
if (i >= rows.length) return Promise.resolve();
rows[i].folder = nw;
return dbPut(‘memes’, rows[i]).then(function() { i++; return upd(); });
}
return upd();
}).then(function() {
_folders = _folders.filter(function(f) { return f.name !== old; });
_folders.push({ name: nw });
if (_curF === old) _curF = nw;
closeModal(); paintStrip(); loadGrid(); showToast(‘✓ Renamed’);
}).catch(function() { showToast(‘Error’); });
}

// ─── TOAST ────────────────────────────────────────────────────────────
function showToast(msg) {
var t = document.getElementById(‘toast’);
t.textContent = msg; t.className = ‘show’;
clearTimeout(_toastT);
_toastT = setTimeout(function() { t.className = ‘’; }, 2600);
}

// ─── RESIZE ───────────────────────────────────────────────────────────
window.addEventListener(‘resize’, measureLayout);
window.addEventListener(‘orientationchange’, function() { setTimeout(measureLayout, 300); });

// ─── START ────────────────────────────────────────────────────────────
window.onload = boot;
</script>
