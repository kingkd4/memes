  <div class="lb-hint">✦ hold image to save or copy to photos</div>
  <div class="lb-actions">
    <button class="lb-btn primary" id="lb-share">↑ Share</button>
    <button class="lb-btn" id="lb-move">📂 Move</button>
    <button class="lb-btn del" id="lb-delete">🗑 Delete</button>
  </div>
</div>

<!-- MODAL -->

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-pill"></div>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DB ──────────────────────────────────────────────────────────────
var DB_NAME = 'memebox_v2', DB_VER = 1, db;

function openDB() {
  return new Promise(function(res, rej) {
    var req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains('memes')) {
        var s = d.createObjectStore('memes', { keyPath: 'id', autoIncrement: true });
        s.createIndex('folder', 'folder', { unique: false });
      }
      if (!d.objectStoreNames.contains('folders')) {
        d.createObjectStore('folders', { keyPath: 'name' });
      }
    };
    req.onsuccess = function(e) { db = e.target.result; res(); };
    req.onerror = function() { rej(req.error); };
  });
}

function getStore(name, mode) {
  return db.transaction(name, mode || 'readonly').objectStore(name);
}
function dbGet(store, key) {
  return new Promise(function(res, rej) {
    var r = getStore(store).get(key);
    r.onsuccess = function() { res(r.result); };
    r.onerror = rej;
  });
}
function dbGetAll(store, idx, val) {
  return new Promise(function(res, rej) {
    var r = (idx !== undefined && val !== undefined)
      ? getStore(store).index(idx).getAll(val)
      : getStore(store).getAll();
    r.onsuccess = function() { res(r.result); };
    r.onerror = rej;
  });
}
function dbPut(store, data) {
  return new Promise(function(res, rej) {
    var r = getStore(store, 'readwrite').put(data);
    r.onsuccess = function() { res(r.result); };
    r.onerror = rej;
  });
}
function dbDel(store, key) {
  return new Promise(function(res, rej) {
    var r = getStore(store, 'readwrite').delete(key);
    r.onsuccess = function() { res(); };
    r.onerror = rej;
  });
}
function dbCount(store, idx, val) {
  return new Promise(function(res, rej) {
    var r = idx ? getStore(store).index(idx).count(val) : getStore(store).count();
    r.onsuccess = function() { res(r.result); };
    r.onerror = rej;
  });
}

// ── STATE ────────────────────────────────────────────────────────────
var currentFolder = 'all', folders = [], memes = [];
var selecting = false, selected = {}, selCount = 0;
var lightboxId = null;

// ── INIT ─────────────────────────────────────────────────────────────
async function init() {
  await openDB();
  folders = await dbGetAll('folders');
  renderFolderBar();
  await renderGrid();
}

// ── FOLDERS ──────────────────────────────────────────────────────────
function renderFolderBar() {
  var bar = document.getElementById('folder-bar');
  bar.innerHTML = '';
  bar.appendChild(makeChip('🌸 All', 'all'));
  folders.forEach(function(f) {
    var chip = makeChip('📂 ' + f.name, f.name);
    var timer;
    chip.addEventListener('touchstart', function() {
      timer = setTimeout(function() { showFolderOptions(f.name); }, 600);
    }, { passive: true });
    chip.addEventListener('touchend', function() { clearTimeout(timer); });
    chip.addEventListener('touchmove', function() { clearTimeout(timer); });
    bar.appendChild(chip);
  });
  var nb = document.createElement('button');
  nb.className = 'new-folder-btn';
  nb.textContent = '✦ New Folder';
  nb.onclick = showNewFolderModal;
  bar.appendChild(nb);
  updateCounts();
}

function makeChip(label, folder) {
  var c = document.createElement('div');
  c.className = 'folder-chip' + (currentFolder === folder ? ' active' : '');
  c.dataset.folder = folder;
  c.innerHTML = label + ' <span class="chip-count" id="cnt-' + folder + '">0</span>';
  c.onclick = function() { switchFolder(folder); };
  return c;
}

async function updateCounts() {
  var n = await dbCount('memes');
  var el = document.getElementById('cnt-all');
  if (el) el.textContent = n;
  for (var i = 0; i < folders.length; i++) {
    var c = await dbCount('memes', 'folder', folders[i].name);
    var fe = document.getElementById('cnt-' + folders[i].name);
    if (fe) fe.textContent = c;
  }
}

async function switchFolder(f) {
  currentFolder = f;
  exitSelect();
  renderFolderBar();
  await renderGrid();
}

// ── GRID ─────────────────────────────────────────────────────────────
async function renderGrid() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  memes = currentFolder === 'all'
    ? await dbGetAll('memes')
    : await dbGetAll('memes', 'folder', currentFolder);
  memes.sort(function(a, b) { return b.id - a.id; });

  var cl = document.getElementById('count-label');
  cl.textContent = memes.length
    ? memes.length + ' meme' + (memes.length !== 1 ? 's' : '') + ' ✦'
    : '';

  if (!memes.length) {
    var emp = document.createElement('div');
    emp.className = 'empty';
    emp.innerHTML =
      '<div class="empty-flower">🌷</div>' +
      '<div class="empty-title">nothing here yet~</div>' +
      '<div class="empty-sub">tap <strong style="color:#e07fa8">＋</strong> to add memes<br>from your photos</div>';
    grid.appendChild(emp);
    updateCounts();
    return;
  }

  memes.forEach(function(m) {
    var card = document.createElement('div');
    card.className = 'meme-card' + (selected[m.id] ? ' selected' : '');

    var img = document.createElement('img');
    img.src = m.dataUrl;
    img.loading = 'lazy';
    card.appendChild(img);

    var badge = document.createElement('div');
    badge.className = 'sel-badge';
    badge.textContent = '✓';
    card.appendChild(badge);

    var timer;
    card.addEventListener('touchstart', function() {
      timer = setTimeout(function() {
        if (!selecting) enterSelect();
        toggleSel(m.id, card);
      }, 500);
    }, { passive: true });
    card.addEventListener('touchend', function() { clearTimeout(timer); });
    card.addEventListener('touchmove', function() { clearTimeout(timer); });

    card.addEventListener('click', function() {
      if (selecting) { toggleSel(m.id, card); }
      else { openLightbox(m.id); }
    });

    grid.appendChild(card);
  });
  updateCounts();
}

// ── SELECT ────────────────────────────────────────────────────────────
function enterSelect() {
  selecting = true;
  selected = {};
  selCount = 0;
  document.getElementById('sel-bar').classList.add('visible');
  document.getElementById('select-btn').classList.add('active');
}
function exitSelect() {
  selecting = false;
  selected = {};
  selCount = 0;
  var cards = document.querySelectorAll('.meme-card.selected');
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
  document.getElementById('sel-bar').classList.remove('visible');
  document.getElementById('select-btn').classList.remove('active');
}
function toggleSel(id, card) {
  if (selected[id]) {
    delete selected[id];
    selCount--;
    card.classList.remove('selected');
  } else {
    selected[id] = true;
    selCount++;
    card.classList.add('selected');
  }
}
function getSelIds() {
  return Object.keys(selected).map(function(k) { return parseInt(k, 10); });
}

document.getElementById('select-btn').onclick = function() {
  if (selecting) exitSelect(); else enterSelect();
};
document.getElementById('sel-cancel').onclick = exitSelect;
document.getElementById('sel-delete').onclick = async function() {
  var ids = getSelIds();
  if (!ids.length) return;
  for (var i = 0; i < ids.length; i++) await dbDel('memes', ids[i]);
  showToast('🗑 Deleted ' + ids.length);
  exitSelect();
  await renderGrid();
};
document.getElementById('sel-move').onclick = function() {
  var ids = getSelIds();
  if (!ids.length) return;
  showMoveModal(ids, false);
};

// ── UPLOAD ────────────────────────────────────────────────────────────
document.getElementById('upload-input').addEventListener('change', async function(e) {
  var files = Array.from(e.target.files);
  if (!files.length) return;
  var count = 0;
  for (var i = 0; i < files.length; i++) {
    var url = await toDataUrl(files[i]);
    var folder = currentFolder === 'all' ? '' : currentFolder;
    await dbPut('memes', { dataUrl: url, folder: folder, added: Date.now() });
    count++;
  }
  e.target.value = '';
  showToast('🌸 Added ' + count + ' meme' + (count !== 1 ? 's' : ''));
  await renderGrid();
});

function toDataUrl(file) {
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload = function() { res(r.result); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────
function getMeme(id) {
  for (var i = 0; i < memes.length; i++) if (memes[i].id === id) return memes[i];
  return null;
}

function openLightbox(id) {
  var m = getMeme(id);
  if (!m) return;
  lightboxId = id;
  document.getElementById('lb-img').src = m.dataUrl;
  document.getElementById('lb-folder-tag').textContent = m.folder ? '📂 ' + m.folder : '';
  document.getElementById('lightbox').classList.add('open');
}

document.getElementById('lb-close').onclick = function() {
  document.getElementById('lightbox').classList.remove('open');
  lightboxId = null;
};

document.getElementById('lb-share').onclick = async function() {
  var m = getMeme(lightboxId);
  if (!m) return;
  if (navigator.share) {
    try {
      var blob = b64toBlob(m.dataUrl);
      var ext = blob.type === 'image/png' ? '.png' : (blob.type === 'image/gif' ? '.gif' : '.jpg');
      var file = new File([blob], 'meme' + ext, { type: blob.type });
      var shareData = { files: [file] };
      if (navigator.canShare && navigator.canShare(shareData)) {
        await navigator.share(shareData);
        return;
      }
      await navigator.share(shareData);
      return;
    } catch(err) {
      if (err && err.name === 'AbortError') return;
    }
  }
  openImageTab(m.dataUrl);
};

document.getElementById('lb-move').onclick = function() {
  if (!lightboxId) return;
  showMoveModal([lightboxId], true);
};

document.getElementById('lb-delete').onclick = async function() {
  if (!lightboxId) return;
  await dbDel('memes', lightboxId);
  document.getElementById('lightbox').classList.remove('open');
  lightboxId = null;
  showToast('🗑 Deleted');
  await renderGrid();
};

function openImageTab(dataUrl) {
  var html = '<!DOCTYPE html><html><head>'
    + '<meta name="viewport" content="width=device-width,initial-scale=1">'
    + '<style>*{margin:0;padding:0;box-sizing:border-box}'
    + 'body{background:#fdf0f5;display:flex;align-items:center;justify-content:center;min-height:100vh}'
    + 'img{max-width:100%;max-height:100vh;border-radius:12px}'
    + 'p{position:fixed;bottom:24px;left:0;right:0;text-align:center;color:#c8a0b8;font-family:sans-serif;font-size:13px}'
    + '</style></head><body>'

```
+ '<img src="' + dataUrl + '">'
+ '<p>Hold image → Save to Photos or Copy</p>'
+ '</body></html>';
```

var win = window.open(’’, ‘_blank’);
if (win) {
win.document.write(html);
win.document.close();
showToast(‘Hold image → Save to Photos’);
} else {
showToast(‘Allow pop-ups then try again’);
}
}

function b64toBlob(dataUrl) {
var parts = dataUrl.split(’,’);
var mime = parts[0].match(/:(.*?);/)[1];
var raw = atob(parts[1]);
var arr = new Uint8Array(raw.length);
for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
return new Blob([arr], { type: mime });
}

// ── MODALS ────────────────────────────────────────────────────────────
function openModal(title, body) {
document.getElementById(‘modal-title’).textContent = title;
document.getElementById(‘modal-body’).innerHTML = body;
document.getElementById(‘modal-overlay’).classList.add(‘open’);
}
function closeModal() {
document.getElementById(‘modal-overlay’).classList.remove(‘open’);
}
document.getElementById(‘modal-overlay’).addEventListener(‘click’, function(e) {
if (e.target === document.getElementById(‘modal-overlay’)) closeModal();
});

function showNewFolderModal() {
openModal(‘New Folder ✦’,
‘<input class="modal-input" id="fn-input" type="text" placeholder="Folder name…" maxlength="30">’ +
‘<button class="modal-btn primary" id="fn-ok">Create</button>’ +
‘<button class="modal-btn secondary" id="fn-cancel">Cancel</button>’);
var inp = document.getElementById(‘fn-input’);
setTimeout(function() { inp.focus(); }, 80);
inp.addEventListener(‘keydown’, function(e) { if (e.key === ‘Enter’) doCreate(); });
document.getElementById(‘fn-ok’).onclick = doCreate;
document.getElementById(‘fn-cancel’).onclick = closeModal;

async function doCreate() {
var name = document.getElementById(‘fn-input’).value.trim();
if (!name) { showToast(‘Enter a name ✦’); return; }
if (folders.some(function(f) { return f.name === name; })) { showToast(‘Already exists~’); return; }
await dbPut(‘folders’, { name: name });
folders.push({ name: name });
closeModal();
renderFolderBar();
showToast(‘📂 Created “’ + name + ‘”’);
}
}

function showMoveModal(ids, fromLb) {
var opts = folders.map(function(f) {
return ‘<div class="folder-option" data-f="' + f.name + '">📂 ’ + f.name + ‘</div>’;
}).join(’’);
openModal(‘Move to… ✦’,
‘<div class="folder-list">’ +
‘<div class="folder-option" data-f="">🌸 All (no folder)</div>’ +
opts + ‘</div>’ +
‘<button class="modal-btn secondary" id="mv-cancel">Cancel</button>’);
document.getElementById(‘mv-cancel’).onclick = closeModal;
var opts2 = document.querySelectorAll(’.folder-option’);
for (var i = 0; i < opts2.length; i++) {
(function(opt) {
opt.onclick = async function() {
var target = opt.dataset.f;
for (var j = 0; j < ids.length; j++) {
var m = await dbGet(‘memes’, ids[j]);
if (m) { m.folder = target; await dbPut(‘memes’, m); }
}
closeModal();
if (fromLb) { document.getElementById(‘lightbox’).classList.remove(‘open’); lightboxId = null; }
else { exitSelect(); }
showToast(’📂 Moved ’ + ids.length);
await renderGrid();
};
})(opts2[i]);
}
}

function showFolderOptions(name) {
openModal(’”’ + name + ‘”’,
‘<button class="modal-btn secondary" id="fo-rename">✏️ Rename</button>’ +
‘<button class="modal-btn danger" id="fo-delete">🗑 Delete Folder</button>’ +
‘<button class="modal-btn secondary" id="fo-cancel">Cancel</button>’);
document.getElementById(‘fo-cancel’).onclick = closeModal;
document.getElementById(‘fo-rename’).onclick = function() { closeModal(); showRenameModal(name); };
document.getElementById(‘fo-delete’).onclick = async function() {
var all = await dbGetAll(‘memes’, ‘folder’, name);
for (var i = 0; i < all.length; i++) { all[i].folder = ‘’; await dbPut(‘memes’, all[i]); }
await dbDel(‘folders’, name);
folders = folders.filter(function(f) { return f.name !== name; });
if (currentFolder === name) currentFolder = ‘all’;
closeModal();
renderFolderBar();
await renderGrid();
showToast(‘🗑 Folder deleted’);
};
}

function showRenameModal(old) {
openModal(‘Rename ✦’,
‘<input class="modal-input" id="rn-input" type="text" value="' + old + '" maxlength="30">’ +
‘<button class="modal-btn primary" id="rn-ok">Save</button>’ +
‘<button class="modal-btn secondary" id="rn-cancel">Cancel</button>’);
var inp = document.getElementById(‘rn-input’);
setTimeout(function() { inp.focus(); inp.select(); }, 80);
document.getElementById(‘rn-cancel’).onclick = closeModal;
document.getElementById(‘rn-ok’).onclick = async function() {
var nw = inp.value.trim();
if (!nw || nw === old) { closeModal(); return; }
if (folders.some(function(f) { return f.name === nw; })) { showToast(‘Name taken~’); return; }
await dbDel(‘folders’, old);
await dbPut(‘folders’, { name: nw });
var all = await dbGetAll(‘memes’, ‘folder’, old);
for (var i = 0; i < all.length; i++) { all[i].folder = nw; await dbPut(‘memes’, all[i]); }
folders = folders.filter(function(f) { return f.name !== old; });
folders.push({ name: nw });
if (currentFolder === old) currentFolder = nw;
closeModal();
renderFolderBar();
await renderGrid();
showToast(‘✓ Renamed to “’ + nw + ‘”’);
};
}

// ── TOAST ─────────────────────────────────────────────────────────────
var toastT;
function showToast(msg) {
var t = document.getElementById(‘toast’);
t.textContent = msg;
t.classList.add(‘show’);
clearTimeout(toastT);
toastT = setTimeout(function() { t.classList.remove(‘show’); }, 2400);
}

init();
</script>
