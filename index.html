<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Meme Box">
<title>Meme Box</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #e07fa8;
  --pink-lt: #f4a7c3;
  --lilac: #c9b8e8;
  --lilac-dk: #a080d0;
  --cream: #fdf0f5;
  --border: #f0d6e4;
  --text: #4a3040;
  --muted: #a8849a;
  --header-h: 0px;   /* set by JS */
  --strip-h: 0px;
  --count-h: 20px;
}

*, *::before, *::after {
box-sizing: border-box;
margin: 0; padding: 0;
-webkit-tap-highlight-color: transparent;
}

html {
height: -webkit-fill-available;
}

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–cream);
-webkit-font-smoothing: antialiased;
/* full-height with safe areas */
min-height: 100vh;
min-height: -webkit-fill-available;
overflow: hidden;
position: fixed;
width: 100%;
top: 0; left: 0;
}

/* ── Decorative background ── */
#dotbg {
position: fixed; inset: 0;
background-image: radial-gradient(circle, rgba(224,127,168,0.35) 1.5px, transparent 1.5px);
background-size: 22px 22px;
pointer-events: none; z-index: 0;
}
#blob1 {
position: fixed; top: -60px; right: -60px;
width: 200px; height: 200px;
background: radial-gradient(circle, rgba(201,184,232,0.28) 0%, transparent 70%);
border-radius: 50%; pointer-events: none; z-index: 0;
}
#blob2 {
position: fixed; bottom: 8%; left: -80px;
width: 240px; height: 240px;
background: radial-gradient(circle, rgba(184,228,216,0.22) 0%, transparent 70%);
border-radius: 50%; pointer-events: none; z-index: 0;
}

/* ── HEADER ── */
#header {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 20;
background: rgba(253,240,245,0.96);
-webkit-backdrop-filter: blur(8px);
backdrop-filter: blur(8px);
border-bottom: 1.5px solid var(–border);
padding-top: env(safe-area-inset-top, 44px);
padding-left: 16px; padding-right: 16px; padding-bottom: 11px;
}
#header-inner {
display: flex;
align-items: center;
justify-content: space-between;
padding-top: 10px;
}
#logo-wrap { display: flex; align-items: center; gap: 8px; }
#logo-flower {
font-size: 22px;
display: inline-block;
animation: spin 10s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#logo-text {
font-family: ‘Playfair Display’, Georgia, serif;
font-weight: 700; font-size: 22px;
color: var(–pink); letter-spacing: -0.3px;
}
#header-btns { display: flex; gap: 8px; }

.hbtn {
width: 42px; height: 42px; border-radius: 50%;
border: none; cursor: pointer; color: white;
display: flex; align-items: center; justify-content: center;
background: linear-gradient(135deg, var(–pink-lt), var(–pink));
box-shadow: 0 4px 14px rgba(224,127,168,0.45);
-webkit-appearance: none;
transition: opacity 0.12s;
}
.hbtn:active { opacity: 0.7; }
.hbtn.lilac {
background: linear-gradient(135deg, var(–lilac), var(–lilac-dk));
box-shadow: 0 4px 14px rgba(160,128,208,0.45);
}

/* ── FOLDER STRIP ── */
#folder-strip {
position: fixed;
left: 0; right: 0;
z-index: 19;
background: rgba(255,245,249,0.96);
-webkit-backdrop-filter: blur(6px);
backdrop-filter: blur(6px);
border-bottom: 1px solid var(–border);
padding: 9px 12px;
overflow-x: auto; overflow-y: hidden;
white-space: nowrap;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
display: flex;
align-items: center;
gap: 7px;
}
#folder-strip::-webkit-scrollbar { display: none; }

.fc {
display: inline-flex; align-items: center; gap: 4px;
flex-shrink: 0;
background: #fff;
border: 1.5px solid var(–border);
border-radius: 30px;
padding: 6px 12px 6px 10px;
font-family: ‘DM Sans’, sans-serif;
font-size: 12px; font-weight: 500; color: var(–muted);
cursor: pointer; white-space: nowrap;
-webkit-appearance: none;
transition: background 0.15s;
user-select: none; -webkit-user-select: none;
}
.fc.active {
background: linear-gradient(135deg, var(–pink-lt), var(–lilac));
border-color: transparent; color: white;
box-shadow: 0 3px 10px rgba(240,160,195,0.35);
}
.fc .count {
display: inline-block; border-radius: 10px;
padding: 1px 6px; font-size: 10px;
background: rgba(255,255,255,0.3);
}
.fc:not(.active) .count { background: var(–cream); color: var(–muted); }

.new-folder-btn {
display: inline-flex; align-items: center; flex-shrink: 0;
background: transparent;
border: 1.5px dashed #e8c4d8; border-radius: 30px;
padding: 6px 13px; color: #c8a0b8;
font-family: ‘DM Sans’, sans-serif;
font-size: 12px; font-weight: 500;
cursor: pointer; white-space: nowrap;
-webkit-appearance: none;
}

/* ── COUNT ROW ── */
#count-row {
position: fixed;
left: 0; right: 0; z-index: 18;
padding: 3px 18px 2px;
font-style: italic;
font-family: ‘Playfair Display’, Georgia, serif;
font-size: 11px; color: #c8a0b8; line-height: 20px;
background: rgba(253,240,245,0.5);
}

/* ── SCROLL / GRID ── */
#scroll-box {
position: fixed;
left: 0; right: 0; bottom: 0;
overflow-y: auto; overflow-x: hidden;
-webkit-overflow-scrolling: touch;
z-index: 1;
padding: 10px 10px 110px;
}

#grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 8px;
}

.mc {
position: relative;
border-radius: 13px;
overflow: hidden;
background: #fff0f5;
border: 2.5px solid transparent;
box-shadow: 0 2px 8px rgba(200,140,180,0.12);
cursor: pointer;
aspect-ratio: 1 / 1;
user-select: none; -webkit-user-select: none;
}
.mc img {
width: 100%; height: 100%;
object-fit: cover; display: block;
pointer-events: none;
-webkit-user-drag: none;
}
.mc.sel {
border-color: var(–pink);
box-shadow: 0 0 0 3px rgba(224,127,168,0.3);
}
.mc .ck {
position: absolute; top: 5px; right: 5px;
width: 22px; height: 22px; border-radius: 50%;
background: var(–pink); color: white;
font-size: 12px; line-height: 22px; text-align: center;
display: none; z-index: 3;
box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}
.mc.sel .ck { display: block; }

/* Empty state */
#empty-wrap { padding: 60px 20px; text-align: center; grid-column: 1 / -1; }
#empty-ico {
font-size: 52px; display: block; margin-bottom: 14px;
animation: bob 3s ease-in-out infinite;
}
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
#empty-ttl {
font-family: ‘Playfair Display’, Georgia, serif;
font-style: italic; font-size: 20px; color: #c8a0b8; margin-bottom: 8px;
}
#empty-sub { font-size: 13px; color: #c8a0b8; line-height: 1.75; }

/* ── SELECTION BAR ── */
#selbar {
position: fixed;
left: 50%; bottom: 28px;
transform: translateX(-50%) translateY(130px);
background: white; border: 1.5px solid var(–border);
border-radius: 32px; padding: 8px 10px;
display: flex; gap: 6px; align-items: center;
box-shadow: 0 8px 30px rgba(200,140,180,0.28);
z-index: 50; white-space: nowrap;
transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
#selbar.up { transform: translateX(-50%) translateY(0); }

.sab {
border-radius: 22px; padding: 8px 14px;
font-family: ‘DM Sans’, sans-serif; font-size: 13px; font-weight: 500;
border: 1.5px solid var(–border); background: var(–cream); color: var(–text);
cursor: pointer; -webkit-appearance: none;
display: inline-flex; align-items: center; gap: 4px;
transition: opacity 0.12s;
}
.sab:active { opacity: 0.7; }
.sab.danger { color: #d46080; border-color: #f0c0d0; background: #fff5f7; }
.sab.soft { color: var(–muted); }

/* ── LIGHTBOX ── */
#lb {
position: fixed; inset: 0;
background: rgba(253,240,245,0.97);
z-index: 200;
display: none;
flex-direction: column;
align-items: center;
}
#lb.open { display: flex; }
#lbhd {
width: 100%; flex-shrink: 0;
display: flex; align-items: center;
justify-content: space-between;
padding: 54px 16px 10px;
}
#lbclose {
width: 38px; height: 38px; border-radius: 50%;
background: white; border: 1.5px solid var(–border);
color: var(–muted); font-size: 17px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
-webkit-appearance: none;
}
#lbclose:active { background: var(–border); }
#lbtag { font-family: ‘Playfair Display’, serif; font-style: italic; font-size: 13px; color: var(–muted); }
#lbimg-wrap {
flex: 1; width: 100%;
display: flex; align-items: center; justify-content: center;
padding: 0 14px; overflow: hidden;
}
#lbimg-wrap img {
max-width: 100%; max-height: 100%;
object-fit: contain;
border-radius: 14px;
box-shadow: 0 8px 40px rgba(200,140,180,0.22);
}
#lbhint {
font-size: 11px; color: #c8a0b8; text-align: center;
padding: 8px 20px 4px;
font-style: italic; font-family: ‘Playfair Display’, serif;
flex-shrink: 0;
}
#lbbtns {
display: flex; gap: 10px;
padding: 10px 18px 34px; width: 100%;
justify-content: center; flex-shrink: 0;
}
.lbb {
flex: 1; max-width: 150px;
background: white; border: 1.5px solid var(–border);
border-radius: 16px; padding: 13px 10px; color: var(–text);
font-family: ‘DM Sans’, sans-serif; font-size: 13px; font-weight: 500;
cursor: pointer; text-align: center;
display: flex; align-items: center; justify-content: center;
gap: 5px; -webkit-appearance: none;
transition: opacity 0.12s;
}
.lbb:active { opacity: 0.7; }
.lbb.pk { background: linear-gradient(135deg,var(–pink-lt),var(–pink)); color:white; border:none; box-shadow:0 4px 16px rgba(224,127,168,0.4); }
.lbb.rd { color: #d46080; border-color: #f0c0d0; background: #fff5f7; }

/* ── MODAL SHEET ── */
#mbg {
position: fixed; inset: 0;
background: rgba(74,48,64,0.35);
z-index: 300;
opacity: 0; pointer-events: none;
transition: opacity 0.2s;
display: flex; align-items: flex-end;
}
#mbg.open { opacity: 1; pointer-events: all; }
#mbox {
background: white; border-radius: 24px 24px 0 0;
width: 100%; padding: 6px 18px 36px;
border-top: 1.5px solid var(–border);
transform: translateY(100%);
transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
max-height: 75vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
}
#mbg.open #mbox { transform: translateY(0); }
#mpill { width:36px; height:4px; background:var(–border); border-radius:2px; margin:10px auto 14px; }
#mtitle {
font-family: ‘Playfair Display’, serif; font-weight:700; font-style:italic;
font-size:19px; color:var(–pink); margin-bottom:14px; text-align:center;
}
#mbody input {
width: 100%; background: var(–cream);
border: 1.5px solid var(–border); border-radius: 13px;
padding: 13px 15px; color: var(–text);
font-family: ‘DM Sans’, sans-serif; font-size: 15px;
outline: none; margin-bottom: 11px;
-webkit-appearance: none; display: block;
}
#mbody input:focus { border-color: var(–pink-lt); }
.mb {
width: 100%; padding: 14px; border-radius: 14px; border: none;
cursor: pointer; font-family: ‘DM Sans’, sans-serif;
font-weight: 500; font-size: 15px;
margin-bottom: 7px; -webkit-appearance: none; display: block;
text-align: center; transition: opacity 0.12s;
}
.mb:active { opacity: 0.8; }
.mb.pk { background: linear-gradient(135deg,var(–pink-lt),var(–pink)); color:white; box-shadow:0 4px 14px rgba(224,127,168,0.32); }
.mb.gy { background: var(–cream); color: var(–muted); border: 1.5px solid var(–border); }
.mb.rd { background: #fff0f3; color: #d46080; border: 1.5px solid #f0c0d0; }

.folder-opt {
display: flex; align-items: center; gap: 10px;
background: var(–cream); border: 1.5px solid var(–border);
border-radius: 13px; padding: 12px 14px; cursor: pointer;
font-size: 14px; font-family: ‘DM Sans’, sans-serif;
margin-bottom: 7px;
transition: border-color 0.12s;
user-select: none; -webkit-user-select: none;
}
.folder-opt:active { border-color: var(–pink-lt); background: #fff5f8; }
.folder-list { max-height: 230px; overflow-y: auto; -webkit-overflow-scrolling: touch; margin-bottom: 10px; }

/* ── TOAST ── */
#toast {
position: fixed; top: 72px; left: 50%;
transform: translateX(-50%) translateY(-8px);
background: white; border: 1.5px solid var(–border);
border-radius: 28px; padding: 9px 20px;
font-size: 13px; font-family: ‘DM Sans’, sans-serif; color: var(–text);
box-shadow: 0 4px 20px rgba(200,140,180,0.22);
opacity: 0; pointer-events: none; z-index: 999;
white-space: nowrap;
transition: opacity 0.2s, transform 0.2s;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Hidden file input */
#upload-input { position:absolute; left:-9999px; opacity:0; width:1px; height:1px; }
</style>

</head>
<body>

<div id="dotbg"></div>
<div id="blob1"></div>
<div id="blob2"></div>

<!-- HEADER -->

<div id="header">
  <div id="header-inner">
    <div id="logo-wrap">
      <span id="logo-flower">🌸</span>
      <span id="logo-text">Meme Box</span>
    </div>
    <div id="header-btns">
      <button class="hbtn" id="selbtn" onclick="toggleSel()" aria-label="Select">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </button>
      <!-- Upload button — label wraps a real file input for Safari -->
      <button class="hbtn" id="upload-btn" onclick="triggerUpload()" aria-label="Add photos">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>
    </div>
  </div>
</div>

<!-- Hidden real file input (Safari needs it triggered from a user event) -->

<input type="file" id="upload-input" accept="image/*" multiple>

<!-- FOLDER STRIP -->

<div id="folder-strip"></div>

<!-- COUNT ROW -->

<div id="count-row"></div>

<!-- SCROLL / GRID -->

<div id="scroll-box">
  <div id="grid"></div>
</div>

<!-- SELECTION BAR -->

<div id="selbar">
  <button class="sab" onclick="doMove()">📂 Move</button>
  <button class="sab danger" onclick="doDelete()">🗑 Delete</button>
  <button class="sab soft" onclick="exitSel()">✕ Done</button>
</div>

<!-- LIGHTBOX -->

<div id="lb">
  <div id="lbhd">
    <button id="lbclose" onclick="closeLB()">✕</button>
    <div id="lbtag"></div>
    <div style="width:38px"></div>
  </div>
  <div id="lbimg-wrap"><img id="lbimg" src="" alt="meme"></div>
  <div id="lbhint">✦ hold image to save or copy</div>
  <div id="lbbtns">
    <button class="lbb pk" onclick="doShare()">↑ Share</button>
    <button class="lbb" onclick="doLBMove()">📂 Move</button>
    <button class="lbb rd" onclick="doLBDel()">🗑 Delete</button>
  </div>
</div>

<!-- MODAL SHEET -->

<div id="mbg" onclick="bgTap(event)">
  <div id="mbox">
    <div id="mpill"></div>
    <div id="mtitle"></div>
    <div id="mbody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────
var DB = null;
var DB_NAME = 'memebox_v1';
var DB_VER  = 1;

var folders = [];   // [{name}]
var memes   = [];   // current view rows
var curFolder = 'all';
var inSel   = false;
var picked  = {};   // id -> true
var lbId    = null;
var toastTimer = null;

// ─────────────────────────────────────────────────────────────────────
// LAYOUT — dynamic top offsets
// ─────────────────────────────────────────────────────────────────────
function applyLayout() {
  var header = document.getElementById('header');
  var strip  = document.getElementById('folder-strip');
  var count  = document.getElementById('count-row');
  var scroll = document.getElementById('scroll-box');

  var hH = header.getBoundingClientRect().height;
  var sH, cH;

  strip.style.top = hH + 'px';
  sH = strip.getBoundingClientRect().height;

  count.style.top = (hH + sH) + 'px';
  cH = count.getBoundingClientRect().height || 20;

  scroll.style.top = (hH + sH + cH) + 'px';
}

window.addEventListener('resize', applyLayout);
window.addEventListener('orientationchange', function(){ setTimeout(applyLayout, 300); });

// ─────────────────────────────────────────────────────────────────────
// INDEXED DB  — wrapped with Safari-safe checks
// ─────────────────────────────────────────────────────────────────────
function openDB() {
  return new Promise(function(resolve, reject) {
    if (!window.indexedDB) { reject(new Error('IndexedDB not supported')); return; }

    var req = indexedDB.open(DB_NAME, DB_VER);

    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('memes')) {
        var store = db.createObjectStore('memes', { keyPath: 'id', autoIncrement: true });
        store.createIndex('folder', 'folder', { unique: false });
      }
      if (!db.objectStoreNames.contains('folders')) {
        db.createObjectStore('folders', { keyPath: 'name' });
      }
    };

    req.onsuccess = function(e) {
      DB = e.target.result;
      // Safari private mode can open but fail on transactions
      DB.onerror = function(ev) { console.warn('DB error', ev); };
      resolve(DB);
    };

    req.onerror = function() { reject(req.error); };
    req.onblocked = function() { reject(new Error('DB blocked')); };
  });
}

function tx(stores, mode) {
  return DB.transaction(stores, mode || 'readonly');
}

function dbAll(store, indexName, value) {
  return new Promise(function(resolve, reject) {
    var t = tx(store);
    var os = t.objectStore(store);
    var req = (indexName != null && value != null)
              ? os.index(indexName).getAll(value)
              : os.getAll();
    req.onsuccess = function() { resolve(req.result || []); };
    req.onerror   = function() { reject(req.error); };
  });
}

function dbGet(store, key) {
  return new Promise(function(resolve, reject) {
    var req = tx(store).objectStore(store).get(key);
    req.onsuccess = function() { resolve(req.result); };
    req.onerror   = function() { reject(req.error); };
  });
}

function dbPut(store, obj) {
  return new Promise(function(resolve, reject) {
    var req = tx(store, 'readwrite').objectStore(store).put(obj);
    req.onsuccess = function() { resolve(req.result); };
    req.onerror   = function() { reject(req.error); };
  });
}

function dbDel(store, key) {
  return new Promise(function(resolve, reject) {
    var req = tx(store, 'readwrite').objectStore(store).delete(key);
    req.onsuccess = function() { resolve(); };
    req.onerror   = function() { reject(req.error); };
  });
}

function dbCount(store, indexName, value) {
  return new Promise(function(resolve, reject) {
    var os = tx(store).objectStore(store);
    var req = (indexName != null && value != null)
              ? os.index(indexName).count(value)
              : os.count();
    req.onsuccess = function() { resolve(req.result); };
    req.onerror   = function() { reject(req.error); };
  });
}

// ─────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', function() {
  applyLayout();
  renderStrip();

  openDB()
    .then(function() { return dbAll('folders'); })
    .then(function(rows) {
      folders = rows || [];
      renderStrip();
      return loadGrid();
    })
    .catch(function(err) {
      console.error('Boot error:', err);
      showToast('Storage unavailable — check Safari settings');
      renderStrip();
      renderEmpty();
    });
});

// ─────────────────────────────────────────────────────────────────────
// FOLDER STRIP
// ─────────────────────────────────────────────────────────────────────
function renderStrip() {
  var strip = document.getElementById('folder-strip');
  strip.innerHTML = '';

  // All chip
  var allChip = makeChip('🌸 All', 'all', curFolder === 'all');
  strip.appendChild(allChip);

  // Folder chips
  folders.forEach(function(f) {
    var chip = makeChip('📂 ' + f.name, f.name, curFolder === f.name);

    // Long-press to show folder options
    var pressTimer;
    chip.addEventListener('touchstart', function(e) {
      pressTimer = setTimeout(function() {
        e.preventDefault();
        showFolderOpts(f.name);
      }, 600);
    }, { passive: true });
    chip.addEventListener('touchend',  function() { clearTimeout(pressTimer); });
    chip.addEventListener('touchmove', function() { clearTimeout(pressTimer); });

    strip.appendChild(chip);
  });

  // New folder button
  var nfb = document.createElement('button');
  nfb.className = 'new-folder-btn';
  nfb.textContent = '✦ New Folder';
  nfb.onclick = showNewFolderModal;
  strip.appendChild(nfb);

  setTimeout(function() {
    applyLayout();
    refreshCounts();
  }, 0);
}

function makeChip(label, folderKey, isActive) {
  var chip = document.createElement('button');
  chip.className = 'fc' + (isActive ? ' active' : '');

  var labelSpan = document.createElement('span');
  labelSpan.textContent = label + ' ';
  chip.appendChild(labelSpan);

  var countSpan = document.createElement('span');
  countSpan.className = 'count';
  countSpan.id = 'count-' + folderKey;
  countSpan.textContent = '0';
  chip.appendChild(countSpan);

  chip.addEventListener('click', function() { switchFolder(folderKey); });
  return chip;
}

function refreshCounts() {
  if (!DB) return;
  dbCount('memes').then(function(n) {
    var el = document.getElementById('count-all');
    if (el) el.textContent = n;
  }).catch(function(){});

  folders.forEach(function(f) {
    dbCount('memes', 'folder', f.name).then(function(n) {
      var el = document.getElementById('count-' + f.name);
      if (el) el.textContent = n;
    }).catch(function(){});
  });
}

function switchFolder(f) {
  curFolder = f;
  inSel = false; picked = {};
  document.getElementById('selbar').classList.remove('up');
  document.getElementById('selbtn').classList.remove('lilac');
  renderStrip();
  loadGrid();
}

// ─────────────────────────────────────────────────────────────────────
// GRID
// ─────────────────────────────────────────────────────────────────────
function loadGrid() {
  var p = (curFolder === 'all')
    ? dbAll('memes')
    : dbAll('memes', 'folder', curFolder);

  return p.then(function(rows) {
    memes = (rows || []).sort(function(a,b){ return b.id - a.id; });
    renderGrid();
  }).catch(function() { renderEmpty(); });
}

function renderGrid() {
  var grid = document.getElementById('grid');
  var cr   = document.getElementById('count-row');

  if (!memes.length) {
    cr.textContent = '';
    renderEmpty();
    return;
  }

  cr.textContent = memes.length + ' meme' + (memes.length !== 1 ? 's' : '') + ' ✦';
  grid.innerHTML = '';

  memes.forEach(function(m) {
    var card = document.createElement('div');
    card.className = 'mc' + (picked[m.id] ? ' sel' : '');
    card.dataset.id = m.id;

    var img = document.createElement('img');
    img.src = m.dataUrl;
    img.alt = '';
    img.loading = 'lazy';
    // Prevent iOS long-press save interfering with our long-press select
    img.addEventListener('contextmenu', function(e){ e.preventDefault(); });
    card.appendChild(img);

    var ck = document.createElement('div');
    ck.className = 'ck';
    ck.textContent = '✓';
    card.appendChild(ck);

    // Long press = enter select mode
    var pressTimer;
    card.addEventListener('touchstart', function() {
      pressTimer = setTimeout(function() {
        if (!inSel) enterSel();
        togglePick(m.id, card);
      }, 500);
    }, { passive: true });
    card.addEventListener('touchend',  function() { clearTimeout(pressTimer); });
    card.addEventListener('touchmove', function() { clearTimeout(pressTimer); });

    card.addEventListener('click', function() {
      if (inSel) { togglePick(m.id, card); }
      else { openLB(m.id); }
    });

    grid.appendChild(card);
  });

  refreshCounts();
}

function renderEmpty() {
  document.getElementById('grid').innerHTML =
    '<div id="empty-wrap">' +
      '<span id="empty-ico">🌷</span>' +
      '<div id="empty-ttl">nothing here yet~</div>' +
      '<div id="empty-sub">tap <strong style="color:var(--pink)">+</strong> to add memes from your photos</div>' +
    '</div>';
  refreshCounts();
}

function getMeme(id) {
  for (var i = 0; i < memes.length; i++) {
    if (memes[i].id === id) return memes[i];
  }
  return null;
}

// ─────────────────────────────────────────────────────────────────────
// FILE UPLOAD  — Safari requires .click() called directly inside a
// user-gesture handler; we use a hidden <input> + programmatic click.
// ─────────────────────────────────────────────────────────────────────
function triggerUpload() {
  var input = document.getElementById('upload-input');
  input.value = '';        // reset so same file can be re-added
  input.click();           // must be synchronous inside click handler
}

document.getElementById('upload-input').addEventListener('change', function(e) {
  var files = Array.prototype.slice.call(e.target.files || []);
  if (!files.length) return;

  var saved = 0;
  var idx = 0;

  function next() {
    if (idx >= files.length) {
      showToast('🌸 Added ' + saved + (saved !== 1 ? ' memes' : ' meme'));
      loadGrid();
      return;
    }
    var file = files[idx++];
    fileToDataUrl(file).then(function(url) {
      // Resize large images to keep storage manageable on Safari
      return resizeDataUrl(url, 1200);
    }).then(function(url) {
      var folderVal = (curFolder === 'all') ? '' : curFolder;
      return dbPut('memes', { dataUrl: url, folder: folderVal, added: Date.now() });
    }).then(function() {
      saved++;
      next();
    }).catch(function(err) {
      console.warn('Save error', err);
      next();
    });
  }
  next();
});

function fileToDataUrl(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result); };
    reader.onerror = function() { reject(reader.error); };
    reader.readAsDataURL(file);
  });
}

// Resize helper — keeps images under maxW px wide to save IndexedDB space
function resizeDataUrl(dataUrl, maxW) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var w = img.naturalWidth, h = img.naturalHeight;
      if (w <= maxW) { resolve(dataUrl); return; }
      var scale = maxW / w;
      var canvas = document.createElement('canvas');
      canvas.width  = maxW;
      canvas.height = Math.round(h * scale);
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = function() { resolve(dataUrl); };
    img.src = dataUrl;
  });
}

// ─────────────────────────────────────────────────────────────────────
// SELECT MODE
// ─────────────────────────────────────────────────────────────────────
function toggleSel() { if (inSel) exitSel(); else enterSel(); }

function enterSel() {
  inSel = true; picked = {};
  document.getElementById('selbar').classList.add('up');
  document.getElementById('selbtn').classList.add('lilac');
}

function exitSel() {
  inSel = false; picked = {};
  document.querySelectorAll('.mc.sel').forEach(function(c){ c.classList.remove('sel'); });
  document.getElementById('selbar').classList.remove('up');
  document.getElementById('selbtn').classList.remove('lilac');
}

function togglePick(id, card) {
  if (picked[id]) { delete picked[id]; card.classList.remove('sel'); }
  else            { picked[id] = true;  card.classList.add('sel'); }
}

function pickedIds() {
  return Object.keys(picked).map(function(k){ return parseInt(k, 10); });
}

function doDelete() {
  var ids = pickedIds();
  if (!ids.length) { showToast('Select some memes first'); return; }
  var i = 0;
  function next() {
    if (i >= ids.length) {
      showToast('🗑 Deleted ' + ids.length);
      exitSel(); loadGrid(); return;
    }
    dbDel('memes', ids[i]).then(function(){ i++; next(); }).catch(function(){ i++; next(); });
  }
  next();
}

function doMove() {
  var ids = pickedIds();
  if (!ids.length) { showToast('Select some memes first'); return; }
  showMoveModal(ids, false);
}

// ─────────────────────────────────────────────────────────────────────
// LIGHTBOX
// ─────────────────────────────────────────────────────────────────────
function openLB(id) {
  var m = getMeme(id); if (!m) return;
  lbId = id;
  document.getElementById('lbimg').src = m.dataUrl;
  document.getElementById('lbtag').textContent = m.folder ? '📂 ' + m.folder : '';
  document.getElementById('lb').classList.add('open');
}

function closeLB() {
  document.getElementById('lb').classList.remove('open');
  lbId = null;
}

function doShare() {
  var m = getMeme(lbId); if (!m) return;
  if (navigator.share) {
    try {
      var blob = dataUrlToBlob(m.dataUrl);
      var ext  = blob.type === 'image/png' ? '.png' : blob.type === 'image/gif' ? '.gif' : '.jpg';
      var file = new File([blob], 'meme' + ext, { type: blob.type });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file] }).catch(function(e){
          if (e.name !== 'AbortError') openInNewWindow(m.dataUrl);
        });
        return;
      }
    } catch(e){}
  }
  openInNewWindow(m.dataUrl);
}

function doLBMove() { if (lbId) showMoveModal([lbId], true); }

function doLBDel() {
  if (!lbId) return;
  var id = lbId;
  dbDel('memes', id).then(function() {
    closeLB(); showToast('🗑 Deleted'); loadGrid();
  }).catch(function(){ showToast('Error deleting'); });
}

function openInNewWindow(url) {
  var html = '<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1">'
    + '<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#fdf0f5;display:flex;align-items:center;justify-content:center;min-height:100vh}img{max-width:100%;max-height:100vh;border-radius:12px}p{position:fixed;bottom:24px;left:0;right:0;text-align:center;color:#c8a0b8;font-family:sans-serif;font-size:14px;padding:0 20px}</style>'

```
+ '</head><body><img src="' + url + '"><p>Hold the image to Save to Photos ✦</p></body></html>';
```

var w = window.open(’’, ‘_blank’);
if (w) { w.document.write(html); w.document.close(); showToast(‘Hold image to save’); }
else { showToast(‘Allow pop-ups to share’); }
}

function dataUrlToBlob(url) {
var parts = url.split(’,’);
var mime  = parts[0].match(/:(.*?);/)[1];
var raw   = atob(parts[1]);
var buf   = new Uint8Array(raw.length);
for (var i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
return new Blob([buf], { type: mime });
}

// ─────────────────────────────────────────────────────────────────────
// MODALS
// ─────────────────────────────────────────────────────────────────────
function showModal(title, bodyHTML) {
document.getElementById(‘mtitle’).textContent = title;
document.getElementById(‘mbody’).innerHTML = bodyHTML;
document.getElementById(‘mbg’).classList.add(‘open’);
}

function closeModal() {
document.getElementById(‘mbg’).classList.remove(‘open’);
}

function bgTap(e) {
if (e.target === document.getElementById(‘mbg’)) closeModal();
}

// New folder
function showNewFolderModal() {
showModal(‘New Folder ✦’,
‘<input id="fi" type="text" placeholder="Folder name…" maxlength="30" autocorrect="off" autocapitalize="off">’ +
‘<button class="mb pk" onclick="createFolder()">Create</button>’ +
‘<button class="mb gy" onclick="closeModal()">Cancel</button>’
);
setTimeout(function(){ var el=document.getElementById(‘fi’); if(el) el.focus(); }, 150);
}

function createFolder() {
var el = document.getElementById(‘fi’); if (!el) return;
var name = el.value.trim();
if (!name) { showToast(‘Enter a name’); return; }
for (var i = 0; i < folders.length; i++) {
if (folders[i].name === name) { showToast(‘Already exists’); return; }
}
dbPut(‘folders’, { name: name }).then(function() {
folders.push({ name: name });
closeModal(); renderStrip(); showToast(‘📂 Created “’ + name + ‘”’);
}).catch(function(){ showToast(‘Error saving folder’); });
}

// Move modal
function showMoveModal(ids, fromLb) {
var folderData = JSON.stringify(ids);

var inner = ‘<div class="folder-list">’;
inner += ‘<div class="folder-opt" data-target="" data-from="' + (fromLb?1:0) + '" data-ids="' + escAttr(folderData) + '">🌸 All (no folder)</div>’;
folders.forEach(function(f) {
inner += ’<div class="folder-opt" data-target="' + escAttr(f.name) + '" data-from="' + (fromLb?1:0) + '" data-ids="' + escAttr(folderData) + '">📂 ’ + escHTML(f.name) + ‘</div>’;
});
inner += ‘</div><button class="mb gy" onclick="closeModal()">Cancel</button>’;

showModal(‘Move to… ✦’, inner);

// Attach events after innerHTML is set
document.querySelectorAll(’.folder-opt’).forEach(function(el) {
el.addEventListener(‘click’, function() {
var target = el.dataset.target;
var fromLbFlag = el.dataset.from === ‘1’;
var parsedIds = JSON.parse(el.dataset.ids);
execMove(parsedIds, target, fromLbFlag);
});
});
}

function execMove(ids, target, fromLb) {
var i = 0;
function next() {
if (i >= ids.length) {
closeModal();
if (fromLb) closeLB(); else exitSel();
showToast(’📂 Moved ’ + ids.length);
loadGrid(); return;
}
dbGet(‘memes’, ids[i]).then(function(m) {
if (m) { m.folder = target; return dbPut(‘memes’, m); }
}).then(function(){ i++; next(); }).catch(function(){ i++; next(); });
}
next();
}

// Folder options (long press)
function showFolderOpts(name) {
showModal(’”’ + name + ‘”’,
‘<button class="mb gy" onclick="closeModal(); showRenameModal(\'' + escAttr(name) + '\')">✏️ Rename</button>’ +
‘<button class="mb rd" onclick="deleteFolder(\'' + escAttr(name) + '\')">🗑 Delete Folder</button>’ +
‘<button class="mb gy" onclick="closeModal()">Cancel</button>’
);
}

function deleteFolder(name) {
dbAll(‘memes’, ‘folder’, name).then(function(rows) {
rows = rows || [];
var i = 0;
function clr() {
if (i >= rows.length) return dbDel(‘folders’, name);
rows[i].folder = ‘’;
return dbPut(‘memes’, rows[i]).then(function(){ i++; return clr(); });
}
return clr();
}).then(function() {
folders = folders.filter(function(f){ return f.name !== name; });
if (curFolder === name) curFolder = ‘all’;
closeModal(); renderStrip(); loadGrid();
showToast(‘🗑 Folder deleted’);
}).catch(function(){ showToast(‘Error deleting folder’); });
}

function showRenameModal(old) {
showModal(‘Rename ✦’,
‘<input id="ri" type="text" value="' + escAttr(old) + '" maxlength="30" autocorrect="off" autocapitalize="off">’ +
‘<button class="mb pk" onclick="execRename(\'' + escAttr(old) + '\')">Save</button>’ +
‘<button class="mb gy" onclick="closeModal()">Cancel</button>’
);
setTimeout(function(){ var el=document.getElementById(‘ri’); if(el){ el.focus(); el.select(); } }, 150);
}

function execRename(old) {
var el = document.getElementById(‘ri’); if (!el) return;
var nw = el.value.trim();
if (!nw || nw === old) { closeModal(); return; }
for (var i = 0; i < folders.length; i++) {
if (folders[i].name === nw) { showToast(‘Name taken’); return; }
}
dbDel(‘folders’, old)
.then(function()  { return dbPut(‘folders’, { name: nw }); })
.then(function()  { return dbAll(‘memes’, ‘folder’, old); })
.then(function(rows) {
rows = rows || []; var i = 0;
function upd() {
if (i >= rows.length) return Promise.resolve();
rows[i].folder = nw;
return dbPut(‘memes’, rows[i]).then(function(){ i++; return upd(); });
}
return upd();
})
.then(function() {
folders = folders.filter(function(f){ return f.name !== old; });
folders.push({ name: nw });
if (curFolder === old) curFolder = nw;
closeModal(); renderStrip(); loadGrid();
showToast(‘✓ Renamed to “’ + nw + ‘”’);
})
.catch(function(){ showToast(‘Error renaming’); });
}

// ─────────────────────────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
var t = document.getElementById(‘toast’);
t.textContent = msg;
t.classList.add(‘show’);
clearTimeout(toastTimer);
toastTimer = setTimeout(function(){ t.classList.remove(‘show’); }, 2600);
}

// ─────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────
function escAttr(s) { return (s + ‘’).replace(/’/g, “\’”); }
function escHTML(s) {
return (s + ‘’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’);
}
